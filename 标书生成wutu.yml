    - data:
        code: "import json\n\n\ndef _stringify(value: object) -> str:\n    if value\
          \ is None:\n        return \"\"\n    if isinstance(value, (dict, list)):\n\
          \        return json.dumps(value, ensure_ascii=False, indent=2)\n    return\
          \ str(value)\n\n\ndef main(project_info: str) -> dict:\n    \"\"\"\n   \
          \ 将project_info JSON字符串转换为可读Markdown。\n    如果解析失败，则按原样输出。\n    \"\"\"\n\
          \    try:\n        parsed = json.loads(project_info) if project_info else\
          \ {}\n    except json.JSONDecodeError:\n        return {\"project_info_md\"\
          : _stringify(project_info)}\n\n    if not isinstance(parsed, dict):\n  \
          \      return {\"project_info_md\": _stringify(parsed)}\n\n    key_map =\
          \ {\n        \"name\": \"项目名称\",\n        \"scale\": \"项目规模\",\n       \
          \ \"location\": \"项目地点\",\n        \"nature\": \"项目性质\",\n        \"construction_unit\"\
          : \"建设单位\",\n        \"contact\": \"联系方式\",\n        \"budget_range\": \"\
          预算范围\",\n    }\n\n    lines = []\n    for key, value in parsed.items():\n\
          \        display_key = key_map.get(key, key)\n        lines.append(f\"-\
          \ {display_key}: {_stringify(value)}\")\n\n    return {\"project_info_md\"\
          : \"\\n\".join(lines) if lines else \"\"}\n"
        code_language: python3
        outputs:
          project_info_md:
            type: string
        selected: false
        title: 项目信息格式化
