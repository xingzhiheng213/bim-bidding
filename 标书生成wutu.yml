        code: "def main(chapters: list, chapter_to_generate: str) -> dict:\n    \"\
          \"\"\n根据用户输入过滤要生成的章节\n    \n    Args:\n        chapters: 章节列表\n        chapter_to_generate:\
          \ 要生成的章节（留空/all=全部，数字=指定章节）\n    \n    Returns:\n        过滤后的章节列表和提示信息\n\
          \"\"\"\n    if not chapter_to_generate or chapter_to_generate.strip() ==\
          \ \"\":\n        # 默认只生成第一章\n        if len(chapters) > 0:\n           \
          \ result = [chapters[0]]\n            message = f\"\\n\\n--- 提示 ---\\n共\
          \ {len(chapters)} 个章节，当前已生成第1章。\\n如需继续生成第2章，请输入 chapter_to_generate=2\\\
          n如需生成所有章节，请输入 chapter_to_generate=all\"\n            return {\n        \
          \        \"filtered_chapters\": result,\n                \"hint_message\"\
          : message\n            }\n    \n    target = chapter_to_generate.strip().lower()\n\
          \    \n    if target == \"all\":\n        # 生成所有章节\n        message = f\"\
          \\n\\n--- 提示 ---\\n正在生成全部 {len(chapters)} 个章节...\"\n        return {\n \
          \           \"filtered_chapters\": chapters,\n            \"hint_message\"\
          : message\n        }\n    \n    # 尝试解析为数字\n    try:\n        idx = int(target)\
          \ - 1  # 转换为0-based索引\n        if 0 <= idx < len(chapters):\n          \
          \  result = [chapters[idx]]\n            chapter_name = chapters[idx]['full_name']\n\
          \            message = f\"\\n\\n--- 提示 ---\\n正在生成：{chapter_name}\\n如需生成下一章，请输入\
          \ chapter_to_generate={idx + 2}\\n如需生成所有章节，请输入 chapter_to_generate=all\"\
          \n            return {\n                \"filtered_chapters\": result,\n\
          \                \"hint_message\": message\n            }\n        else:\n\
          \            # 索引超出范围，返回所有章节\n            message = f\"\\n\\n--- 警告 ---\\\
          n章节号超出范围（1-{len(chapters)}），将生成所有章节\"\n            return {\n          \
          \      \"filtered_chapters\": chapters,\n                \"hint_message\"\
          : message\n            }\n    except ValueError:\n        # 无法解析为数字，返回所有章节\n\
          \        message = f\"\\n\\n--- 警告 ---\\n无法解析章节号，将生成所有章节\"\n        return\
          \ {\n            \"filtered_chapters\": chapters,\n            \"hint_message\"\
          : message\n        }\n"
        code_language: python3
