    - data:
        code: "import re\nimport json\n\ndef main(framework_text: str) -> dict:\n\
          \    \"\"\"\n    解析框架文本，提取章节列表\n    输入格式示例：\n    第1章 项目理解与分析\n    第2章 BIM技术实施方案\n\
          \    \"\"\"\n\n    # 使用正则提取所有章节\n    pattern = r'第(\\d+)章\\s+(.+?)(?=\\\
          n|$)'\n    matches = re.findall(pattern, framework_text, re.MULTILINE)\n\
          \n    chapters = []\n    for chapter_num, chapter_title in matches:\n  \
          \      chapters.append({\n            \"number\": int(chapter_num),\n  \
          \          \"title\": chapter_title.strip(),\n            \"full_name\"\
          : f\"第{chapter_num}章 {chapter_title.strip()}\"\n        })\n\n    return\
          \ {\n        \"result\": chapters,\n        \"count\": len(chapters)\n \
          \   }\n"
