# BIM 标书生成 — 一键运行
# 在 Docker 目录下执行：cd Docker && cp .env.example .env && docker compose up -d --build
# 首次使用：编辑 .env 按需修改（如 POSTGRES_PASSWORD、VITE_API_BASE）
# Redis：默认口令为 compose 内建长随机串（未设 REDIS_PASSWORD 时）。生产请在 .env 中覆盖 REDIS_PASSWORD。

services:
  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-X8vK2mN9pQwR4tY7uZ3hJ6fDcSbV1gH5kLmN7pQr}
    # 不映射 6379 到宿主机，避免资产扫描暴露 Redis；backend/celery 仍通过服务名 redis 访问
    # 若需本机 redis-cli 调试，取消下行注释：
    # ports:
    #   - "6379:6379"
    command: >
      sh -c 'exec redis-server --requirepass "$$REDIS_PASSWORD"'
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bim_bidding}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bim_bidding}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.backend
    env_file: .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-X8vK2mN9pQwR4tY7uZ3hJ6fDcSbV1gH5kLmN7pQr}@redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bim_bidding}
      UPLOAD_DIR: /app/data/uploads
      EXPORT_DIR: /app/data/exports
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-8080},http://127.0.0.1:${FRONTEND_PORT:-8080}
    volumes:
      - backend_uploads:/app/data/uploads
      - backend_exports:/app/data/exports
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.backend
    command: celery -A celery_app worker -l info -P solo
    env_file: .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-X8vK2mN9pQwR4tY7uZ3hJ6fDcSbV1gH5kLmN7pQr}@redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bim_bidding}
      UPLOAD_DIR: /app/data/uploads
      EXPORT_DIR: /app/data/exports
    volumes:
      - backend_uploads:/app/data/uploads
      - backend_exports:/app/data/exports
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
  backend_exports:
