# BIM 标书生成 — 一键运行
# 在 Docker 目录下执行：cd Docker && cp .env.example .env && docker compose up -d --build
# 首次使用：编辑 .env 按需修改（如 POSTGRES_PASSWORD、VITE_API_BASE）

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bim_bidding}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bim_bidding}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.backend
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bim_bidding}
      UPLOAD_DIR: /app/data/uploads
      EXPORT_DIR: /app/data/exports
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-8080},http://127.0.0.1:${FRONTEND_PORT:-8080}
    volumes:
      - backend_uploads:/app/data/uploads
      - backend_exports:/app/data/exports
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.backend
    command: celery -A celery_app worker -l info -P solo
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bim_bidding}
      UPLOAD_DIR: /app/data/uploads
      EXPORT_DIR: /app/data/exports
    volumes:
      - backend_uploads:/app/data/uploads
      - backend_exports:/app/data/exports
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8001}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
  backend_exports:
